services:
    - type: web
    name: teddyxmd-support
    env: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    healthCheckPath: /
    
    envVars:
            - key: NODE_ENV
        value: production
            - key: PORT
        value: 50900
      
            - key: COMPANY_NAME
        value: TEDDY-XMD Support
      
            - key: ADMIN_KEY
        generateValue: true # Render will auto-generate a strong random key
      
            - key: MONGO_URI
        sync: false # YOU MUST FILL THIS IN RENDER DASHBOARD
      
            - key: BOT_TOKEN
        sync: false # YOU MUST FILL THIS IN RENDER DASHBOARD
      
            - key: ADMIN_IDS
        sync: false # YOU MUST FILL THIS IN RENDER DASHBOARD
        # example: 6815918612,123456789
      
            - key: OUTLOOK_EMAIL
        sync: false # YOU MUST FILL THIS IN RENDER DASHBOARD
      
            - key: OUTLOOK_PASS
        sync: false # YOU MUST FILL THIS IN RENDER DASHBOARD
