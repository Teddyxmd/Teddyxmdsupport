<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEDDY-XMD Official Support</title>
<style>body{font-family:Poppins,Arial;background:linear-gradient(135deg,#0078D4,#25D366);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:#fff;padding:35px;border-radius:20px;max-width:520px;width:100%}h2{text-align:center;color:#0078D4}input,textarea{width:100%;padding:14px;margin-bottom:15px;border:2px solid #eee;border-radius:12px}button{width:100%;padding:15px;background:#0078D4;color:#fff;border:none;border-radius:12px;font-weight:bold;cursor:pointer}#result{margin-top:20px;padding:15px;border-radius:12px;display:none}.success{background:#d4edda;color:#155724}.error{background:#f8d7da;color:#721c24}</style>
</head>
<body>
<div class="container">
    <h2>📞 TEDDY-XMD SUPPORT</h2>
    <form id="supportForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" rows="5" placeholder="Describe your issue..." required></textarea>
        <button type="submit">Submit Ticket</button>
    </form>
    <div id="result"></div>
</div>
<script>
document.getElementById('supportForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const btn = this.querySelector('button');
    btn.innerText = 'Sending...';
    
    const payload = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        message: document.getElementById('message').value.trim()
    };

    try{
        const res = await fetch(window.location.origin + '/api/support', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        document.getElementById('result').style.display = 'block';
        if(data.success){
            document.getElementById('result').className = 'success';
            document.getElementById('result').innerHTML = `✅ Ticket: ${data.ticketID}<br><br><b>AI Reply:</b><br>${data.aiReply}`;
            this.reset();
        }else{
            document.getElementById('result').className = 'error';
            document.getElementById('result').innerHTML = `❌ ${data.error}`;
        }
    }catch(err){
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').className = 'error';
        document.getElementById('result').innerHTML = '❌ Network Error. Check Render Logs';
    }
    btn.innerText = 'Submit Ticket';
});
</script>
</body>
</html>
