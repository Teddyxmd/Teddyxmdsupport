<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEDDY-XMD Official Support</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',Arial;background:linear-gradient(135deg,#0078D4 0%,#25D366 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;padding:35px;border-radius:20px;max-width:520px;width:100%;box-shadow:0 15px 50px rgba(0,0,0,0.3)}
.logo{text-align:center;font-size:28px;font-weight:800;color:#0078D4;margin-bottom:5px}
.subtitle{text-align:center;color:#666;margin-bottom:25px;font-size:14px}
input,textarea{width:100%;padding:14px;margin-bottom:15px;border:2px solid #eee;border-radius:12px;font-size:14px;transition:0.3s}
input:focus,textarea:focus{border-color:#0078D4;outline:none}
button{width:100%;padding:15px;background:linear-gradient(135deg,#0078D4,#005a9e);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;transition:0.3s}
button:hover{transform:translateY(-2px)}
#result{margin-top:20px;padding:15px;border-radius:12px;display:none}
.success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.ai-box{background:#f0f8ff;padding:15px;border-left:4px solid #0078D4;margin-top:15px;border-radius:8px;font-size:14px}
</style>
</head>
<body>
<div class="container">
    <div class="logo">📞 TEDDY-XMD SUPPORT</div>
    <div class="subtitle">Official Support for Bot Updates, Bugs & Help</div>
    <form id="supportForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" rows="5" placeholder="Describe your issue in detail..." required></textarea>
        <button type="submit">Submit Ticket</button>
    </form>
    <div id="result"></div>
</div>
<script>
document.getElementById('supportForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button'); btn.innerText = 'Sending...'; btn.disabled = true;
    const data = {name:name.value,email:email.value,message:message.value};
    try {
        const res = await fetch('/api/support', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
        const result = await res.json();
        if(result.success){
            document.getElementById('result').className = 'success';
            document.getElementById('result').innerHTML = `<b>✅ Ticket Created: ${result.ticketID}</b><br>Check your email for confirmation.<div class="ai-box"><b>AI Instant Reply:</b><br>${result.aiReply}</div>`;
            document.getElementById('supportForm').reset();
        } else {
            document.getElementById('result').className = 'error'; document.getElementById('result').innerHTML = `❌ Error: ${result.error}`;
        }
    } catch(err){document.getElementById('result').className = 'error'; document.getElementById('result').innerHTML = '❌ Server Error. Try again.';}
    document.getElementById('result').style.display = 'block'; btn.innerText = 'Submit Ticket'; btn.disabled = false;
});
</script>
</body>
</html>
