<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEDDY-XMD Official Support</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Poppins',Arial;
    background: url('https://files.catbox.moe/5ffdce.jpeg') no-repeat center fixed;
    background-size: cover;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    position:relative;
}
/* Dark overlay */
body::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    background: linear-gradient(135deg, rgba(0,120,212,0.7) 0%, rgba(37,211,102,0.7) 100%);
    z-index:0;
}

.container{
    background: linear-gradient(135deg, rgba(37,211,102,0.95) 0%, rgba(0,120,212,0.95) 100%); /* GREEN CARD */
    backdrop-filter:blur(20px);
    padding:40px 35px;
    border-radius:24px;
    max-width:520px;
    width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation:slideUp 0.6s ease;
    position:relative;
    z-index:1;
    border: 1px solid rgba(255,255,255,0.2);
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.logo{text-align:center;margin-bottom:25px}
.logo-img{
    width:80px;
    height:80px;
    border-radius:20px;
    margin-bottom:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    object-fit:cover;
    border: 3px solid #fff;
}
.logo h2{
    color:#fff; /* WHITE TEXT */
    font-size:26px;
    font-weight:700;
    margin-bottom:5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}
.logo p{color:rgba(255,255,255,0.9);font-size:14px} /* WHITE SUBTEXT */

label{display:block;margin-bottom:8px;color:#fff;font-weight:600;font-size:14px}

input,textarea{
    width:100%;
    padding:14px 16px;
    margin-bottom:18px;
    border:2px solid rgba(255,255,255,0.3);
    border-radius:14px;
    font-family:'Poppins';
    font-size:15px;
    transition:all 0.3s;
    background:rgba(255,255,255,0.15);
    color:#fff;
}
input::placeholder, textarea::placeholder{color:rgba(255,255,255,0.6)}
input:focus,textarea:focus{
    outline:none;
    border-color:#fff;
    background:rgba(255,255,255,0.25);
    box-shadow:0 0 0 4px rgba(255,255,255,0.2);
}
textarea{resize:vertical;min-height:120px}

button{
    width:100%;
    padding:16px;
    background:#fff; /* WHITE BUTTON */
    color:#25D366; /* GREEN TEXT */
    border:none;
    border-radius:14px;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    transition:all 0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
button:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,0.3)}
button:disabled{opacity:0.7;cursor:not-allowed;transform:none}

#result{
    margin-top:20px;
    padding:18px;
    border-radius:14px;
    display:none;
    animation:fadeIn 0.4s;
    font-size:14px;
    line-height:1.6;
    background:rgba(255,255,255,0.9);
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.success{color:#155724;border:1px solid #25D366}
.error{color:#721c24;border:1px solid #ff4444;background:rgba(255,255,255,0.9)}
.ticket-id{font-weight:700;color:#0078D4;font-size:16px}
.loader{display:inline-block;width:16px;height:16px;border:2px solid #25D366;border-top:2px solid transparent;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* CHANNEL BUTTONS */
.channels{margin-top:30px;padding-top:25px;border-top:1px solid rgba(255,255,255,0.3);text-align:center}
.channels p{color:#fff;font-size:14px;margin-bottom:15px;font-weight:600}
.channel-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border-radius:14px;
    text-decoration:none;
    font-weight:600;
    font-size:15px;
    transition:all 0.3s;
    background:#fff;
}
.channel-btn:hover{transform:translateY(-2px)}
.whatsapp-btn{color:#25D366}
.telegram-btn{color:#0088cc}
</style>
</head>
<body>
<div class="container">
    <div class="logo">
        <img src="https://files.catbox.moe/5ffdce.jpeg" alt="TEDDY-XMD Logo" class="logo-img">
        <h2>TEDDY-XMD SUPPORT</h2>
        <p>We reply within 24 hours</p>
    </div>
    
    <form id="supportForm">
        <label>Your Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
        <label>Your Email</label>
        <input type="email" id="email" placeholder="john@gmail.com" required>
        <label>Describe Your Issue</label>
        <textarea id="message" rows="5" placeholder="Tell us what problem you're facing..." required></textarea>
        <button type="submit" id="btn">Submit Ticket</button>
    </form>
    
    <div id="result"></div>

    <!-- CHANNEL LINKS -->
    <div class="channels">
        <p>Join Our Communities For Updates</p>
        <a href="https://whatsapp.com/channel/0029Vb6NveDBPzjPa4vIRt3n" target="_blank" class="channel-btn whatsapp-btn">
            💬 Join WhatsApp Channel
        </a>
        <a href="https://t.me/free_net_zone" target="_blank" class="channel-btn telegram-btn">
            ✈️ Join Telegram Channel
        </a>
    </div>
</div>

<script>
document.getElementById('supportForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>Sending...';
    const result = document.getElementById('result');
    result.style.display = 'none';
    
    const payload = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        message: document.getElementById('message').value.trim()
    };

    try{
        const res = await fetch('/api/support', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        result.style.display = 'block';
        
        if(data.success){
            result.className = 'success';
            result.innerHTML = `✅ <b>Ticket Created!</b><br><br>Ticket ID: <span class="ticket-id">${data.ticketID}</span><br><br><b>Auto Reply:</b><br>${data.aiReply.replace(/\n/g,'<br>')}`;
            this.reset();
        }else{
            result.className = 'error';
            result.innerHTML = `❌ ${data.error}`;
        }
    }catch(err){
        result.style.display = 'block';
        result.className = 'error';
        result.innerHTML = '❌ Network Error. Check Render Logs';
    }
    
    btn.disabled = false;
    btn.innerHTML = 'Submit Ticket';
});
</script>
</body>
</html>
